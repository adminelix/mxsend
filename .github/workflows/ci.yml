name: CI

# Pipeline & release process:
#
#   PR → main         check → test → security
#   Push → main        check → test → security → build
#   Tag v*             check → test → security → build → release
#
# Release: push a tag matching v* (or create a release on GitHub).
# Binaries for 5 targets are built and uploaded as release assets.
# Tag example: git tag v0.1.0 && git push origin v0.1.0
# Note: tags containing "-" (e.g. v0.1.0-rc.1) create a pre-release.
#       A pre-release must be manually promoted to a full release on GitHub.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          components: clippy, rustfmt
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo check --all-targets --all-features
      - run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
      - run: cargo test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
      - name: Install security tools
        run: cargo install cargo-audit cargo-deny
      - name: cargo audit
        run: cargo audit
      - name: cargo deny
        run: cargo deny check

  build:
    if: github.ref_type == 'tag' || github.ref_name == 'main'
    needs: [check, test, security]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-26
          - target: aarch64-apple-darwin
            os: macos-26
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          targets: ${{ matrix.target }}
      - name: Install cross-compilers
        if: runner.os == 'Linux' && matrix.target != 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          elif [[ "${{ matrix.target }}" == "x86_64-pc-windows-gnu" ]]; then
            sudo apt-get install -y mingw-w64
            echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc" >> $GITHUB_ENV
          fi
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package release artifact
        shell: bash
        run: |
          mkdir -p releases
          if [[ "${{ matrix.target }}" == *-windows-* ]]; then
            cp "target/${{ matrix.target }}/release/mxsend.exe" "releases/mxsend-${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/mxsend" "releases/mxsend-${{ matrix.target }}"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: mxsend-${{ matrix.target }}
          path: releases/

  release:
    needs: [build]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: mxsend-*
          path: releases/
          merge-multiple: true
      - uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: releases/*
          body_path: RELEASE_NOTES.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          update_release: true
