version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Berlin
    target-branch: main
    open-pull-requests-limit: 10
    labels:
      - dependencies
    assignees:
      - adminelix
    reviewers:
      - adminelix
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Berlin
    target-branch: main
    open-pull-requests-limit: 10
    labels:
      - dependencies
    assignees:
      - adminelix
    reviewers:
      - adminelix
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
