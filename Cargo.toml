[package]
name = "matrix-send"
version = "0.1.0"
edition = "2024"
description = "todo: write description"

[dependencies]
matrix-sdk = { version = "0.16.0", features = ["e2e-encryption"] }
tokio = { version = "1.0", features = ["full"] }
clap = { version = "4.0", features = ["derive", "env"] }
anyhow = "1.0.95"

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"
debug = false

[profile.dev]
opt-level = 1
debug = true
incremental = true
panic = "unwind"
overflow-checks = true
